<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA HARDWARE - PROTOCOLO CAOS EVOLVED</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #ff6600;
            --black: #000000;
            --white: #ffffff;
            --pixel-font: 'Press Start 2P', cursive;
            --danger: #ff0033;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }

        body {
            background-color: #050505;
            color: var(--white);
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex; justify-content: center;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-3px, 0px); }
            40% { transform: translate(1px, -1px); }
            60% { transform: translate(-3px, 1px); }
            80% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -2px); }
        }
        .shake { animation: shake 0.2s infinite; }

        #game-viewport {
            width: 100%; max-width: 500px; height: 100%;
            background: var(--black); border: 4px solid #222;
            display: flex; flex-direction: column; position: relative;
        }

        header {
            padding: 12px; border-bottom: 2px solid #333;
            font-family: var(--pixel-font); font-size: 8px;
            display: flex; justify-content: space-between;
        }

        .hp-bar { color: var(--danger); }
        .timer-box { color: var(--orange); font-size: 11px; }

        .boss-area {
            height: 140px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            background: radial-gradient(circle, #1a0a00 0%, #000 70%);
        }

        .p0nch0 {
            width: 55px; height: 55px; border: 3px solid var(--white);
            position: relative; animation: float 1.5s infinite ease-in-out;
            background: #000;
        }
        .p0nch0::before, .p0nch0::after { content: ''; position: absolute; width: 6px; height: 6px; background: white; top: 15px; }
        .p0nch0::before { left: 12px; } .p0nch0::after { right: 12px; }
        .mouth { position: absolute; bottom: 10px; left: 15px; width: 25px; height: 6px; border: 3px solid white; border-top: none; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .bubble {
            background: white; color: black; padding: 8px; border-radius: 4px;
            font-family: var(--pixel-font); font-size: 7px;
            position: absolute; right: 10px; top: 20px; max-width: 160px;
        }

        .content-area { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .q-text { font-size: 1rem; font-weight: bold; margin-bottom: 20px; text-align: center; color: #ffcc00; }
        
        .option-btn {
            background: #111; color: white; border: 1px solid #444;
            padding: 14px; font-family: var(--pixel-font); font-size: 8px;
            text-align: left; width: 100%; cursor: pointer; margin-bottom: 10px;
        }
        .option-btn:active { background: var(--orange); color: black; }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }

        /* DODGE FIELD */
        #dodge-field {
            width: 280px; height: 280px; border: 4px solid white;
            position: relative; overflow: hidden; background: #000;
        }
        #player-heart {
            width: 20px; height: 20px; position: absolute;
            color: red; font-size: 20px; z-index: 5;
        }
        .bullet { position: absolute; background: white; width: 10px; height: 10px; border-radius: 50%; }

        /* TATETI */
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 80px); gap: 8px; }
        .ttt-cell { 
            width: 80px; height: 80px; border: 2px solid white; 
            display: flex; align-items: center; justify-content: center;
            font-family: var(--pixel-font); font-size: 28px;
        }

        /* MASH GAME */
        .mash-bar { width: 200px; height: 30px; border: 2px solid white; position: relative; }
        #mash-fill { width: 0%; height: 100%; background: #00ff00; }

        .timer-progress { width: 100%; height: 8px; background: #222; }
        #timer-fill { width: 100%; height: 100%; background: var(--orange); }

        .splash {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: var(--pixel-font); font-size: 20px; z-index: 500;
            text-shadow: 2px 2px #000; pointer-events: none; display: none;
        }
    </style>
</head>
<body>

<div id="game-viewport">
    <header>
        <div class="hp-bar" id="hp-display"></div>
        <div class="timer-box">TEMP: <span id="time-left">35</span>s</div>
    </header>
    <div class="timer-progress"><div id="timer-fill"></div></div>

    <div class="boss-area">
        <div class="p0nch0" id="boss-sprite"><div class="mouth"></div></div>
        <div class="bubble" id="boss-talk">SISTEMA INICIADO.</div>
    </div>

    <div class="content-area" id="screen-main">
        <div id="start-ui" style="text-align: center; margin-top: 40px;">
            <h1 style="font-family: var(--pixel-font); font-size: 14px; color: var(--orange); margin-bottom: 20px;">HARDWARE: PROTOCOLO CAOS</h1>
            <p style="font-size: 11px; line-height: 1.8; margin-bottom: 30px;">
                Responde 25 preguntas.<br>
                Cada combate te robará tiempo.<br>
                La dificultad sube cada 8 preguntas.
            </p>
            <button class="option-btn" onclick="startGame()" style="text-align: center;">[ INICIAR ]</button>
        </div>

        <div id="quiz-ui" style="display: none;">
            <div id="q-txt" class="q-text"></div>
            <div id="q-options"></div>
        </div>

        <div id="result-ui" style="display: none; text-align: center;">
            <h2 id="final-status" style="font-family: var(--pixel-font); font-size: 14px;"></h2>
            <div id="final-stats" style="font-family: var(--pixel-font); font-size: 8px; margin: 20px 0;"></div>
            <input type="text" id="user-name" placeholder="NOMBRE TÉCNICO" style="width:100%; padding:15px; background:black; color:white; border:1px solid white; font-family: var(--pixel-font); font-size: 8px; margin-bottom: 10px;">
            <button class="option-btn" onclick="sendWhatsApp()" style="text-align: center;">[ ENVIAR ]</button>
        </div>
    </div>

    <div id="game-overlay" class="overlay">
        <div id="diff-label" style="font-family: var(--pixel-font); font-size: 8px; color: yellow; margin-bottom: 10px;">DIFICULTAD: NORMAL</div>
        <div id="game-box"></div>
    </div>

    <div id="splash" class="splash"></div>
</div>

<script>
    const questions = [
        { q: "¿Componente principal del filtrado transitorio?", o: ["Diodo", "Varistor", "Transistor", "Inductor"], a: 1 },
        { q: "¿Etapa que transforma CA en CC?", o: ["Transformación", "Rectificación", "Regulación", "Filtro"], a: 1 },
        { q: "¿Función del Termistor?", o: ["Sube voltaje", "Evita picos", "Mide cooler", "Filtra"], a: 1 },
        { q: "¿110V en toma de 220V?", o: ["Nada", "Explota/Se quema", "Ahorra", "Mejora"], a: 1 },
        { q: "¿Qué usa el puente rectificador?", o: ["Capacitores", "Diodos", "Resistencias", "Bobinas"], a: 1 },
        { q: "¿Línea para GPUs modernas?", o: ["+5V", "+3.3V", "+12V", "-12V"], a: 2 },
        { q: "¿Para qué es +5vSB?", o: ["Potencia", "PC Apagada/Standby", "Enfriar", "Solo SSD"], a: 1 },
        { q: "¿Circuito de factor de potencia?", o: ["EPS", "APFC", "SATA", "Molex"], a: 1 },
        { q: "¿Qué componente acumula campo magnético?", o: ["Capacitor", "Inductor", "Fusible", "Diodo"], a: 1 },
        { q: "¿Conector Motherboard?", o: ["PCI-E", "EPS", "ATX 24p", "Molex"], a: 2 },
        { q: "¿Certificación superior a Gold?", o: ["Silver", "White", "Platinum", "Bronze"], a: 2 },
        { q: "¿Fórmula Watts?", o: ["W=V/A", "W=V*A", "W=A-V", "W=V+A"], a: 1 },
        { q: "¿Separa etapa primaria de secundaria?", o: ["Capacitores", "Transformador", "Cable", "Cooler"], a: 1 },
        { q: "¿Gabinete más común?", o: ["Full", "Slim", "Mid Tower", "Mini"], a: 2 },
        { q: "¿Grosor mínimo acero SECC?", o: ["0.1mm", "0.4mm", "0.6mm", "1mm"], a: 2 },
        { q: "¿Ubicación ideal de la fuente?", o: ["Arriba", "Abajo", "Lado", "Frente"], a: 1 },
        { q: "¿SSD en bahía de...?", o: ["5.25\"", "3.5\"", "2.5\"", "1.0\""], a: 2 },
        { q: "¿Señal de fuente lista?", o: ["PS-ON", "PWR-OK", "5vSB", "COM"], a: 1 },
        { q: "¿Dificulta paso de corriente?", o: ["Diodo", "Resistor", "Cooler", "Relé"], a: 1 },
        { q: "¿Ventiladores mínimos en buena caja?", o: ["0", "1", "2", "8"], a: 2 },
        { q: "¿Eficiencia mínima estándar?", o: ["50%", "70%", "95%", "100%"], a: 1 },
        { q: "¿Función filtros anti-polvo?", o: ["Lujo", "Protección", "Velocidad", "Silencio"], a: 1 },
        { q: "¿Mide intensidad eléctrica?", o: ["Volt", "Amper", "Watt", "Ohm"], a: 1 },
        { q: "¿Protege ante sobretensión?", o: ["Cooler", "Fusible", "Inductor", "Led"], a: 1 },
        { q: "¿Última etapa de la PSU?", o: ["Filtro/Regulación", "Rectificación", "Entrada", "Multiplicación"], a: 0 }
    ];

    let currentIdx = 0;
    let hp = 10;
    let score = 0;
    let timeLeft = 35;
    let penalty = 0;
    let timerId;
    let active = false;

    function startGame() {
        document.getElementById('start-ui').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        updateHP();
        loadQuestion();
        active = true;
        timerId = setInterval(() => {
            if (!active) return;
            timeLeft -= 0.1;
            if (timeLeft <= 0) { damage(2); nextQuestion(); }
            document.getElementById('time-left').innerText = Math.ceil(timeLeft);
            document.getElementById('timer-fill').style.width = (timeLeft / 35 * 100) + '%';
        }, 100);
    }

    function loadQuestion() {
        if (currentIdx >= questions.length) return finish();
        timeLeft = 35 - penalty;
        if (timeLeft < 5) timeLeft = 5;
        penalty = 0;
        const q = questions[currentIdx];
        document.getElementById('q-txt').innerText = q.q;
        const opts = document.getElementById('q-options');
        opts.innerHTML = '';
        q.o.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = `> ${o}`;
            b.onclick = () => { if (i === q.a) { score++; if (Math.random() > 0.6) launchBattle(); else nextQuestion(); } else { damage(1); nextQuestion(); } };
            opts.appendChild(b);
        });
    }

    function damage(n) {
        hp -= n;
        updateHP();
        document.getElementById('game-viewport').classList.add('shake');
        setTimeout(() => document.getElementById('game-viewport').classList.remove('shake'), 200);
        if (hp <= 0) { alert("SISTEMA QUEMADO."); location.reload(); }
    }

    function updateHP() { document.getElementById('hp-display').innerHTML = 'HP:' + '<i class="fas fa-heart"></i>'.repeat(hp); }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    function getDifficulty() {
        if (currentIdx < 8) return { level: 1, label: "FÁCIL", speed: 3, freq: 15 };
        if (currentIdx < 16) return { level: 2, label: "NORMAL", speed: 5, freq: 10 };
        return { level: 3, label: "CAOS", speed: 8, freq: 5 };
    }

    function launchBattle() {
        active = false;
        const diff = getDifficulty();
        const startTime = Date.now();
        const overlay = document.getElementById('game-overlay');
        overlay.style.display = 'flex';
        document.getElementById('diff-label').innerText = "DIFICULTAD: " + diff.label;
        document.getElementById('diff-label').style.color = diff.level === 3 ? "red" : "yellow";

        const container = document.getElementById('game-box');
        container.innerHTML = '';
        
        const games = ['DODGE', 'TATETI', 'MASH'];
        const game = games[Math.floor(Math.random() * (currentIdx < 10 ? 2 : 3))];

        if (game === 'DODGE') startDodge(container, startTime, diff);
        else if (game === 'TATETI') startTateti(container, startTime, diff);
        else startMash(container, startTime, diff);
    }

    function endBattle(win, startTime) {
        penalty = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById('game-overlay').style.display = 'none';
        const splash = document.getElementById('splash');
        splash.innerText = win ? "¡SISTEMA OK!" : "¡FALLO!";
        splash.style.color = win ? "#00ff00" : "#ff0000";
        splash.style.display = 'block';
        if (!win) damage(1);
        setTimeout(() => { splash.style.display = 'none'; active = true; nextQuestion(); }, 1000);
    }

    // --- MINIJUEGOS ---

    function startDodge(container, startTime, diff) {
        const field = document.createElement('div'); field.id = 'dodge-field';
        const heart = document.createElement('div'); heart.id = 'player-heart'; heart.innerHTML = '❤️';
        field.appendChild(heart); container.appendChild(field);
        let hX = 130, hY = 130;
        field.onpointermove = (e) => {
            const r = field.getBoundingClientRect();
            hX = Math.max(0, Math.min(260, e.clientX - r.left - 10));
            hY = Math.max(0, Math.min(260, e.clientY - r.top - 10));
            heart.style.left = hX + 'px'; heart.style.top = hY + 'px';
        };

        let bullets = [], frame = 0;
        const loop = setInterval(() => {
            frame++;
            if (frame % diff.freq === 0) {
                const b = document.createElement('div'); b.className = 'bullet';
                const side = Math.floor(Math.random()*4);
                let x, y, vx, vy;
                if(side==0){x=0;y=Math.random()*280;vx=diff.speed;vy=0;}
                else if(side==1){x=280;y=Math.random()*280;vx=-diff.speed;vy=0;}
                else if(side==2){x=Math.random()*280;y=0;vx=0;vy=diff.speed;}
                else {x=Math.random()*280;y=280;vx=0;vy=-diff.speed;}
                field.appendChild(b); bullets.push({el:b, x, y, vx, vy});
            }
            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy; b.el.style.left = b.x+'px'; b.el.style.top = b.y+'px';
                if (Math.hypot(b.x-hX, b.y-hY) < 15) { clearInterval(loop); endBattle(false, startTime); }
                if (b.x< -20 || b.x>300 || b.y<-20 || b.y>300) { b.el.remove(); bullets.splice(i,1); }
            });
            if (frame > 100) { clearInterval(loop); endBattle(true, startTime); }
        }, 50);
    }

    function startTateti(container, startTime, diff) {
        let board = ["","","","","","","","",""];
        const grid = document.createElement('div'); grid.className = 'ttt-grid';
        const render = () => {
            grid.innerHTML = '';
            board.forEach((v, i) => {
                const c = document.createElement('div'); c.className = 'ttt-cell'; c.innerText = v;
                c.onclick = () => { if (board[i] === "") { board[i] = "X"; if (checkWin("X")) endBattle(true, startTime); else if (!board.includes("")) endBattle(true, startTime); else setTimeout(cpu, diff.level === 3 ? 50 : 300); } };
                grid.appendChild(c);
            });
        };
        const cpu = () => {
            const free = board.map((v,i) => v===""?i:null).filter(v=>v!==null);
            board[free[Math.floor(Math.random()*free.length)]] = "O";
            render(); if (checkWin("O")) endBattle(false, startTime);
        };
        const checkWin = (p) => [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(c => c.every(idx => board[idx] === p));
        container.appendChild(grid); render();
    }

    function startMash(container, startTime, diff) {
        container.innerHTML = `<div style="font-family:var(--pixel-font);font-size:8px;margin-bottom:10px">¡PRESIONA RÁPIDO!</div>
                               <div class="mash-bar"><div id="mash-fill"></div></div>
                               <button class="option-btn" id="mash-btn" style="margin-top:20px;text-align:center">MASH!!</button>`;
        let val = 50, target = 100;
        const fill = document.getElementById('mash-fill');
        const btn = document.getElementById('mash-btn');
        const dec = setInterval(() => { val -= (diff.level * 1.5); fill.style.width = val + '%'; if(val <= 0) { clearInterval(dec); endBattle(false, startTime); } }, 100);
        btn.onpointerdown = () => { val += 8; if(val >= target) { clearInterval(dec); endBattle(true, startTime); } };
    }

    function finish() {
        active = false; clearInterval(timerId);
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        const win = score >= 18;
        document.getElementById('final-status').innerText = win ? "SISTEMA ESTABLE" : "SISTEMA CORRUPTO";
        document.getElementById('final-status').style.color = win ? "green" : "red";
        document.getElementById('final-stats').innerHTML = `ACIERTOS: ${score}/25<br>VIDA: ${hp}/10`;
    }

    function sendWhatsApp() {
        const n = document.getElementById('user-name').value || "Anonimo";
        const text = `*HARDWARE CAOS*%0A*Tecnico:* ${n}%0A*Nota:* ${score}/25%0A*HP:* ${hp}`;
        window.open(`https://wa.me/543816490060?text=${text}`);
    }
</script>
</body>
</html>
